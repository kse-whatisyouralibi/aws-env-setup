name: Terraform AWS Deploy

on:
  pull_request:
    branches: [ "main" ]
    paths: [ "infra/**" ]
  push:
    branches: [ "main" ]
    paths: [ "infra/**" ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write
  security-events: write  # For uploading Checkov SARIF results

concurrency:
  group: terraform-deploy
  cancel-in-progress: false

jobs:
  checkov:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
          framework: terraform
          external_checks_dirs: check/custom_checks
          skip_check: CKV_AWS_23,CKV_AWS_382,CKV_AWS_260,CUSTOM_AWS_3,CKV_AWS_91,CKV_AWS_150,CKV_AWS_131,CKV_AWS_2,CKV_AWS_135,CKV_AWS_126,CKV_AWS_8,CKV_AWS_79,CKV_AWS_103,CKV_AWS_152,CKV_AWS_28,CKV2_AWS_28,CKV2_AWS_5
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: Upload Checkov results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif

  plan:
    runs-on: ubuntu-latest
    environment: PROD
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Cache TF plugins
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-${{ runner.os }}-${{ hashFiles('infra/**/*.tf') }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.5

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ./infra

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./infra

      - name: Terraform Plan
        id: plan
        run: terraform plan -input=false -out=tfplan -no-color
        working-directory: ./infra

      - name: Add Plan to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ## Terraform Plan
            ```
            ${{ steps.plan.outputs.stdout }}
            ```        

  apply:
    runs-on: ubuntu-latest
    environment: PROD
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.5

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ./infra

      - name: Run Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
          framework: terraform
          external_checks_dirs: check/custom_checks
          skip_check: CKV_AWS_23,CKV_AWS_382,CKV_AWS_260,CUSTOM_AWS_3,CKV_AWS_91,CKV_AWS_150,CKV_AWS_131,CKV_AWS_2,CKV_AWS_135,CKV_AWS_126,CKV_AWS_8,CKV_AWS_79,CKV_AWS_103,CKV_AWS_152,CKV_AWS_28,CKV2_AWS_28,CKV2_AWS_5
          output_format: sarif
          output_file_path: checkov-results.sarif
        continue-on-error: true

      - name: Upload Checkov results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan
        working-directory: ./infra

      - name: Terraform Apply
        run: terraform apply -input=false tfplan
        working-directory: ./infra
